# DockerVet - Dockerfile Security Linter
# Official workflow template for GitHub Code Scanning integration
#
# Usage:
#   Copy this file to .github/workflows/dockervet.yml in your repository.
#   DockerVet will scan all Dockerfiles and upload results to GitHub Code Scanning.

name: DockerVet Dockerfile Scan

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  schedule:
    # Run weekly on Monday at 08:00 UTC
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  dockervet:
    name: DockerVet Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b  # v2
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Run DockerVet
        run: |
          # Pinned to v0.1.0 — update intentionally when upgrading DockerVet
          find . -name 'Dockerfile*' -not -path '*/node_modules/*' | xargs npx --yes dockervet@0.1.0 --format sarif > dockervet-results.sarif || true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@ae9ef3a1d2e3413523c3741725c30064970cc0d4  # v3
        if: always()
        with:
          sarif_file: dockervet-results.sarif
          category: dockervet
